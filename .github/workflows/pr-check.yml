---
name: pr-check
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Check whether PR author is trusted
      id: trust
      shell: bash
      run: |
        case "${{ github.event.pull_request.author_association }}" in
          OWNER|MEMBER|COLLABORATOR)
            echo "is_trusted=true" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "is_trusted=false" >> "$GITHUB_OUTPUT"
            ;;
        esac

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=sha

    - name: Login to GHCR
      if: steps.trust.outputs.is_trusted == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ steps.trust.outputs.is_trusted == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Archive and push Helm Chart to GitHub Container Registry
      if: steps.trust.outputs.is_trusted == 'true'
      shell: bash
      run: |
        helm package ./chart \
          --version=0.0.0-${{ fromJSON(steps.meta.outputs.json).tag-names[0] }} \
          --app-version=${{ fromJSON(steps.meta.outputs.json).tag-names[0] }} \
          -d ./dist/chart
        helm push ./dist/chart/ssh-proxy-0.0.0-${{ fromJSON(steps.meta.outputs.json).tag-names[0] }}.tgz \
          oci://ghcr.io/${{ github.repository }}/chart

    - name: Skip artifact publish for untrusted PR authors
      if: steps.trust.outputs.is_trusted != 'true'
      run: |
        echo "Skipping image and chart publish for ${{ github.event.pull_request.user.login }} (${{ github.event.pull_request.author_association }})."

  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v5

    - name: Install tools
      run: make install-tools

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.7

    - name: Check
      run: make check

  int-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v5

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
      with:
        version: latest

    - name: Run test
      run: |-
        docker compose -f docker-compose.yml up -d --build
        go test -v ./test/integration/...

  helm-deploy-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        load: true
        tags: ssh-proxy:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Create kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: chart-test

    - name: Load image into kind
      run: kind load docker-image ssh-proxy:test --name chart-test

    - name: Install Helm chart
      run: |
        helm install ssh-proxy ./chart \
          --set image.repository=ssh-proxy \
          --set image.tag=test \
          --set image.pullPolicy=Never \
          --set proxy.config.routes[0].username=test \
          --set proxy.config.routes[0].target.host=localhost \
          --set proxy.config.routes[0].target.port=22 \
          --set proxy.config.routes[0].target.auth.type=password \
          --set proxy.config.routes[0].target.auth.password=test \
          --set proxy.config.routes[0].target.insecure=true \
          --set proxy.config.routes[0].auth[0].type=password \
          --set proxy.config.routes[0].auth[0].password=test \
          --wait \
          --timeout 120s

    - name: Verify deployment is ready
      run: kubectl rollout status deployment/ssh-proxy --timeout=60s

    - name: Check pod health
      run: |
        kubectl get pods -l app.kubernetes.io/name=ssh-proxy -o wide
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=ssh-proxy --timeout=60s

    - name: Verify services exist
      run: |
        kubectl get svc ssh-proxy-http
        kubectl get svc ssh-proxy-ssh

    - name: Test health endpoint
      run: |
        kubectl port-forward svc/ssh-proxy-http 8080:8080 &
        sleep 3
        curl -sf http://localhost:8080/health
        curl -sf http://localhost:8080/ready

    - name: Print debug info on failure
      if: failure()
      run: |
        echo "=== Pods ==="
        kubectl get pods -A
        echo "=== Deployment ==="
        kubectl describe deployment ssh-proxy
        echo "=== Pod logs ==="
        kubectl logs -l app.kubernetes.io/name=ssh-proxy --tail=100
        echo "=== Events ==="
        kubectl get events --sort-by='.lastTimestamp'
